services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flip
      POSTGRES_USER: flip
      POSTGRES_PASSWORD: flip
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/flip
      DATABASE_USER: flip
      DATABASE_PASSWORD: flip
      STORAGE_PATH: /app/uploads
    depends_on:
      - postgres
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  uploads:
